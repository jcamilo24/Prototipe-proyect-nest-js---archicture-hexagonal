version: '3.8'

services:
  app:
    build: .
    container_name: core_api_app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGO_URI: mongodb://mongo:27017/practice-project
      REDIS_HOST: redis
      REDIS_PORT: 6379
      IDEMPOTENCY_KEY_PREFIX: idempotency
      IDEMPOTENCY_TTL_SECONDS: 86400
      BREB_BASE_URL: http://host.docker.internal:3001/transfer
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev

  mongo:
    image: mongo:7
    container_name: core_api_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: core_api_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: core_api_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    # No depends_on app: suele levantarse solo mongo+redis y la API con npm en el host.
    # El scrape usa host.docker.internal:3000 (ver observability/prometheus.yml).

volumes:
  mongo_data:
  redis_data: